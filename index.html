<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Soporte Técnico SD Panel</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      color: #111827;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('fondoo.jpg') center center / cover no-repeat;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(4, 19, 38, 0.76);
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 590px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(6px);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.35);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 12px;
    }

    .logo-wrap img {
      width: 120px;
      max-width: 100%;
      border-radius: 16px;
      background: white;
      padding: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      margin: 8px 0 0 0;
      color: #0d2b4c;
      font-size: 30px;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-top: 8px;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #e5e7eb;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    .tab.active {
      background: #2563eb;
      color: white;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
      font-size: 14px;
      color: #1f2937;
    }

    .helper {
      margin-top: 5px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
    }

    input,
    select {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .options {
      margin-top: 10px;
      display: grid;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f3f4f6;
      padding: 12px;
      border-radius: 12px;
      font-weight: normal;
      cursor: pointer;
    }

    .option input {
      width: auto;
      margin: 0;
    }

    .main-btn {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .main-btn:hover {
      background: #1d4ed8;
    }

    .main-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-top: 16px;
      padding: 13px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
    }

    .id-box {
      background: #f3f4f6;
      padding: 10px;
      border-radius: 10px;
      margin-top: 8px;
      font-weight: bold;
      word-break: break-all;
      color: #111827;
    }

    .copy-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #374151;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo-wrap">
      <img src="sd.jpg" alt="SD Panel">
    </div>

    <h1>Soporte Técnico</h1>
    <p class="subtitle">Solicita asistencia o consulta tu reporte</p>

    <div class="tabs">
      <button class="tab active" onclick="mostrarSeccion('crear')">Crear reporte</button>
      <button class="tab" onclick="mostrarSeccion('consultar')">Consultar reporte</button>
    </div>

    <div id="crear" class="section active">
      <form id="supportForm">

        <label>Correo que requiere soporte</label>
        <input type="email" id="usuario" placeholder="Ej: cliente@gmail.com" required>

        <label>Distribuidor</label>
        <p class="helper">
          Coloca el número de WhatsApp de tu proveedor con el prefijo de tu país. Ejemplo: +591XXXXXXX
        </p>
        <input type="text" id="whatsapp" placeholder="Ej: +59170000000" required>

        <label>Plataforma</label>
        <select id="plataforma" required>
          <option value="">Selecciona una plataforma</option>
          <option value="Netflix">Netflix</option>
          <option value="Disney Plus">Disney Plus</option>
          <option value="Amazon Prime Video">Amazon Prime Video</option>
          <option value="HBO Max">HBO Max</option>
          <option value="Flujo TV">Flujo TV</option>
          <option value="YouTube Premium">YouTube Premium</option>
          <option value="Spotify">Spotify</option>
          <option value="Otra">Otra</option>
        </select>

        <label>¿Qué opción requiere?</label>

        <div class="options">
          <label class="option">
            <input type="checkbox" name="opcion" value="Restablecer contraseña">
            Restablecer contraseña
          </label>

          <label class="option">
            <input type="checkbox" name="opcion" value="Código inicio de sesión">
            Código inicio de sesión
          </label>

          <label class="option">
            <input type="checkbox" name="opcion" value="Actualizar hogar">
            Actualizar hogar
          </label>

          <label class="option">
            <input type="checkbox" name="opcion" value="Código de acceso temporal">
            Código de acceso temporal
          </label>
        </div>

        <button class="main-btn" id="btnEnviar" type="submit">
          Enviar reporte
        </button>

        <div id="mensajeCrear" class="message"></div>

      </form>
    </div>

    <div id="consultar" class="section">

      <label>ID de reporte</label>
      <input type="text" id="buscarId" placeholder="Ej: REP-20260612-193412-1234">

      <label>WhatsApp del proveedor</label>
      <p class="helper">
        Coloca el número de WhatsApp de tu proveedor con el prefijo de tu país. Ejemplo: +591XXXXXXX
      </p>
      <input type="text" id="buscarWhatsapp" placeholder="Ej: +59170000000">

      <button class="main-btn" onclick="consultarReporte()">
        Consultar
      </button>

      <div id="mensajeConsulta" class="message"></div>
    </div>

    <div class="footer">
      Soporte por orden de llegada.
    </div>

  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx6rji2Kxyocf-8TM8wNxlwFQorlvmvypFqCMNM_qMzQBE-L9nL4-0sIArz34puoiXM/exec';

    let ultimoIdGenerado = '';

    function mostrarSeccion(seccion) {
      document.querySelectorAll('.section').forEach(function(s) {
        s.classList.remove('active');
      });

      document.querySelectorAll('.tab').forEach(function(t) {
        t.classList.remove('active');
      });

      document.getElementById(seccion).classList.add('active');

      if (seccion === 'crear') {
        document.querySelectorAll('.tab')[0].classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
      }
    }

    function generarIdReporte() {
      const fecha = new Date();

      const y = fecha.getFullYear();
      const m = String(fecha.getMonth() + 1).padStart(2, '0');
      const d = String(fecha.getDate()).padStart(2, '0');
      const h = String(fecha.getHours()).padStart(2, '0');
      const min = String(fecha.getMinutes()).padStart(2, '0');
      const s = String(fecha.getSeconds()).padStart(2, '0');
      const random = Math.floor(1000 + Math.random() * 9000);

      return 'REP-' + y + m + d + '-' + h + min + s + '-' + random;
    }

    function limpiarTelefono(valor) {
      return String(valor)
        .trim()
        .replace(/\s+/g, '')
        .replace(/-/g, '');
    }

    function mostrarMensaje(id, texto, tipo) {
      const box = document.getElementById(id);
      box.innerHTML = texto;
      box.className = 'message ' + tipo;
      box.style.display = 'block';
    }

    function copiarId() {
      if (!ultimoIdGenerado) return;

      navigator.clipboard.writeText(ultimoIdGenerado).then(function() {
        alert('ID copiado correctamente');
      });
    }

    function llamarJSONP(url, callbackName) {
      const script = document.createElement('script');
      script.src = url;

      script.onerror = function() {
        mostrarMensaje(
          'mensajeCrear',
          'No se pudo conectar con el servidor. Revisa la implementación de Apps Script.',
          'error'
        );
      };

      document.body.appendChild(script);
    }

    document.getElementById('supportForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const btnEnviar = document.getElementById('btnEnviar');

      const usuario = document.getElementById('usuario').value.trim();
      const whatsapp = limpiarTelefono(document.getElementById('whatsapp').value);
      const plataforma = document.getElementById('plataforma').value.trim();

      const opciones = Array.from(
        document.querySelectorAll('input[name="opcion"]:checked')
      ).map(function(option) {
        return option.value;
      });

      if (!usuario || !whatsapp || !plataforma) {
        mostrarMensaje('mensajeCrear', 'Completa todos los campos obligatorios.', 'error');
        return;
      }

      if (opciones.length === 0) {
        mostrarMensaje('mensajeCrear', 'Selecciona al menos una opción de soporte.', 'error');
        return;
      }

      const idReporte = generarIdReporte();
      ultimoIdGenerado = idReporte;

      const callbackName = 'callbackCrear' + Date.now();

      window[callbackName] = function(respuesta) {
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Enviar reporte';

        if (respuesta.ok) {
          mostrarMensaje(
            'mensajeCrear',
            'Reporte enviado correctamente.<br><br>' +
            '<b>Guarda este ID para consultar tu reporte:</b>' +
            '<div class="id-box">' + idReporte + '</div>' +
            '<button type="button" class="copy-btn" onclick="copiarId()">Copiar ID</button>',
            'success'
          );

          document.getElementById('supportForm').reset();
        } else {
          mostrarMensaje('mensajeCrear', respuesta.mensaje, 'error');
        }

        delete window[callbackName];
      };

      btnEnviar.disabled = true;
      btnEnviar.textContent = 'Enviando...';

      const url =
        WEB_APP_URL +
        '?accion=crear' +
        '&idReporte=' + encodeURIComponent(idReporte) +
        '&usuario=' + encodeURIComponent(usuario) +
        '&whatsapp=' + encodeURIComponent(whatsapp) +
        '&plataforma=' + encodeURIComponent(plataforma) +
        '&solicitud=' + encodeURIComponent(opciones.join(', ')) +
        '&detalle=' + encodeURIComponent('') +
        '&callback=' + encodeURIComponent(callbackName);

      llamarJSONP(url, callbackName);
    });

    function consultarReporte() {
      const id = document.getElementById('buscarId').value.trim();
      const whatsapp = limpiarTelefono(document.getElementById('buscarWhatsapp').value);

      if (!id || !whatsapp) {
        mostrarMensaje('mensajeConsulta', 'Debes colocar el ID de reporte y el WhatsApp del proveedor.', 'error');
        return;
      }

      mostrarMensaje('mensajeConsulta', 'Consultando reporte...', 'info');

      const callbackName = 'callbackReporte' + Date.now();

      window[callbackName] = function(respuesta) {
        if (respuesta.ok) {
          mostrarMensaje(
            'mensajeConsulta',
            '<b>Reporte encontrado</b><br><br>' +
            '<b>ID:</b> ' + respuesta.idReporte + '<br>' +
            '<b>Correo:</b> ' + respuesta.usuario + '<br>' +
            '<b>WhatsApp proveedor:</b> ' + respuesta.whatsapp + '<br>' +
            '<b>Plataforma:</b> ' + respuesta.plataforma + '<br>' +
            '<b>Solicitud:</b> ' + respuesta.solicitud + '<br>' +
            '<b>Estado:</b> ' + respuesta.estado + '<br>' +
            '<b>Respuesta soporte:</b> ' + respuesta.respuesta,
            'info'
          );
        } else {
          mostrarMensaje('mensajeConsulta', respuesta.mensaje, 'error');
        }

        delete window[callbackName];
      };

      const url =
        WEB_APP_URL +
        '?accion=buscar' +
        '&id=' + encodeURIComponent(id) +
        '&whatsapp=' + encodeURIComponent(whatsapp) +
        '&callback=' + encodeURIComponent(callbackName);

      llamarJSONP(url, callbackName);
    }
  </script>

</body>
</html>
